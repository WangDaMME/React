<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>4_getSnapShotBeforeUpdate的使用场景</title>
	<style>
		.list{
			width: 200px;
			height: 150px;
			background-color: skyblue;
			overflow: auto; /** 不想溢出，以滚动条 显示 */
		}
        /** 容器 150， 每条30 ， 最多显示 5 条*/
		.news{
			height: 30px;
		}

        /** list.scrollTop 不累加 ， list.scrollHeight=210 list 这个容器 总共 7x30px*/

	</style>
</head>
<body>
	<!-- 准备好一个“容器” -->
	<div id="test"></div>
	
	<!-- 引入react核心库 -->
	<script type="text/javascript" src="../../js/17.0.1/react.development.js"></script>
	<!-- 引入react-dom，用于支持react操作DOM -->
	<script type="text/javascript" src="../../js/17.0.1/react-dom.development.js"></script>
	<!-- 引入babel，用于将jsx转为js -->
	<script type="text/javascript" src="../../js/17.0.1/babel.min.js"></script>

	<script type="text/babel">
		

        /* 1 想要 每隔1s 网上 跳1个新闻 , 
           2 拖动滚动条， 滚动条显示内容冻结 */
        class NewsList extends React.Component
        {
            state = {
                newsArr: [] // 冬天开启很多的新闻
            }

            
            //组件 1挂载完后，开启定时器
            componentDidMount(){

                setInterval(  ()=>{
                    // 获取原装胎
                    const {newsArr} = this.state
                    // 模拟一条新闻
                    const news = '新闻' + (newsArr.length+1)
                 
                    // 更新状态 把最新的新闻放到top
                    this.setState( {newsArr: [news, ...newsArr]}) ; // spreading 原来照旧
                },1000)

            }

            /**
             * 【getSnapshotBeforeUpdate】 新的新闻还没有 放到页面 前 (ie.didMount要执行前，调用)
             * 
             *  1. 拿一下老的 list 内容区高度 --> 给 componentDidUpdate下游
             * */

             getSnapshotBeforeUpdate(){
                 return this.refs.list.scrollHeight ;
             }

             componentDidMUpdate(prevProps, prevState, snapshotHeight){
                //动态调整网上 窜多少  //持续的往上窜
                this.refs.list.scrollTop += this.refs.list.scrollHeight  - snapshotHeight; //snapshotHeight： 老的传过来的高度
                //this.refs.list.scrollHeight ： 现在 拖动 滚动条 到的 高度
             }


            render(){
                return(
                    // 用下 字符串 ref形式
                    <div className = "list" ref="list">
                        {
                            // n 是数组里的每个item, index 作为unique_key
                            this.state.newsArr.map( (n,index)=>{
                                return <div key ={index} className = "news">{n} </div>
                            }


                            )
                        }
                    </div>
                )
            }
        }

		ReactDOM.render(<NewsList/>,document.getElementById('test'))
	</script>
</body>
</html>
