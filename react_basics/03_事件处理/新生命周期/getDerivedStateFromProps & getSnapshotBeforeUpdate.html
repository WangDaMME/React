<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引出生命周期</title>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test"></div>  <!-- 必须要有容器 dom 元素节点 -->



    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../../js/17.0.1/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../../js/17.0.1/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../../js/17.0.1/babel.min.js"></script>

    <script type="text/babel"> 

        // [输出结果顺序 as expected]

        class Demo extends React.Component
        {

        //可以放在构造里
        state={
                count: 0 //初始化状态
             }


            //1. 最开始 调用constructor
            constructor(props)
            {

                console.log("1.Constructor")
                super(props)
                
                
            }

            
            /*** 要写成 不是 instance方法 ， 写成 static
             *   并返回 对象 or null不写返回 undefined 是不对的***/
            static getDerivedStateFromProps(props, state) // props  stat为初始state的值
            {
                console.log("2.getDerivedStateFromProps", props, state)

                // return null;
                return {count: 108}; //返回状态对象 得和 状态 对的上, 就把状态更新影响了
            }

            //componentDidUpdate( a, b): a,b 都是先前的 preProps, preState
            //在页面马上就要出效果时候 调用
            //在更新之前 获取 快照
            getSnapshotBeforeUpdate(){
                console.log("getSnapshotBeforeUpdate")

                return "sssssnnnnppppsssstt"; // 任何值 都可以作为快照值

            }

            componentDidUpdate(a,b,c)
            {
                console.log("componentDidUpdate",a,b)
            
                console.log("getSnapshotBeforeUpdate 传下来的 snapshot",c)
            }


            add =()=>{
                //回调函数 没有this
                const {count} = this.state 

                this.setState( {count : count+1})
            }

            //3. render
            render(){
                const {count} = this.state
                console.log("3.render")
                return(
                    <div>
                        <h2>当前求和: {count}</h2>
                        <button onClick = {this.add}>点我+1</button>

                    </div>
                )
            }
       
          
        }

        ReactDOM.render(<Demo name={"199"}/>, document.getElementById("test"))


    </script>

</body>
</html>
