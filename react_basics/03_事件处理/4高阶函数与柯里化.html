<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高阶函数</title>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test1"></div>  <!-- 必须要有容器 dom 元素节点 -->



    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../js/babel.min.js"></script>

    <script type="text/babel"> 
        /**
         *  【高阶函数 与 柯里化 】 
         *   高阶函数：如果一个函数符合 下面2个 规范中的任何一个，那该函数就是高阶函数.
         *            1. 若A函数，接收的参数是一个函数，那么A 就饿可以称之为 高阶函数
         *            2. 若A函数，调用的返回值依然是一个函数， 那么A就可以称之为高阶函数
         * 
         * 
         *    函数的柯里化Currying：
         *    通过函数调用继续返回函数的方式，实现多次接受参数最后统一处理的函数编码形式.
         *    
         *    function sum(a){
							return(b)=>{
								return (c)=>{
									return a+b+c
								}
							}
						}
         * */
        


       class Login extends React.Component{


        // 用state 实现 受控组件

        state = {
            // 语义上， 实现初始化状态， 要不第一个来了突然就是输入的值
            username:'',
            password:""
        }

        //将用户名保存到state 中 - HOC 高阶函数

        // saveFormData 就是HOC, 满足条件2.  - 返回值是一个函数
        saveFormData(dataInputStr) //接收传进来的str
        {
            //这个是 真正的回调函数， react帮你传递event 对象
            return (event)=>{ 
                //应该返回一个函数

                // this.setState( { dataInputStr: event.target.value })  // dataInputStr 只会增加一个变量 (ie.字符串)

                this.setState( {  [dataInputStr]: event.target.value })

            }




        }
       

        handleSubmit = (event)=>{ // event 默认传入的
            event.preventDefault(); // 关闭 自动跳转页面
            // const {username, password} = this; 
            //!!!注意 取用是放在state里  就应该从state里取

            const {username , password} = this.state;
            //这里不再存的是节点 而是 值 所以不是 username.value
            alert(`输入的用户名是: ${username}, 输入的密码是： ${password}`); //模板字符串 里面用 $


        }
         render()
         {
            return (
                // action 提交地址 onSubmit自己的封装, 表单提交时候 调用的回调函数
                <form action = "https://www.google.com" onSubmit= {this.handleSubmit}>
                    
                    {/* saveUsername . save.... 太复杂了 esp. 注册表单 用高阶函数标识
                        
                        // 要返回一个函数 给 onChange event 否则 就是自己调用
                    */}
                    用户名： <input type="text" onChange = {this.saveFormData("username")} name="username" /> &nbsp;
                    密码： <input type="text"  onChange={this.saveFormData("password")} name="password" />
                    <button> 登陆 </button>

                </form>

            )


         }

       }

        ReactDOM.render(<Login />, document.getElementById("test1"))
    



    </script>

</body>
</html>
