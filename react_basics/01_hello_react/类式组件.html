<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test"></div>  <!-- 必须要有容器 dom 元素节点 -->
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../js/babel.min.js"></script>

    <script type="text/babel"> 
    
        //1. 创建类式组件
        class MyComponent extends React.Component{

            //构造器constructor 可有可无super()

            //render必须要写, 且必须带返回值

            // render 是放在哪里？ -- 放在MyComponentd的原型对象上，供实例使用
            // render 中的this 是谁？ -- MyComponent 的实例对象。 也叫： MyComponent 组件的实例对象

            render(){
                return <h2><我是用class定义的组件(适用于【复杂组件的类型】的定义)</h2>
            }
        }    
        
        ReactDOM.render(<MyComponent/>, document.getElementById("test"))
    </script>

</body>
</html>
