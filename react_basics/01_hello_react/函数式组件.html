<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
    <style type="text/css">
        .title { /*类属性 */
            background-color: skyblue;
        }
        
    
    </style>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test"></div>  <!-- 必须要有容器 dom 元素节点 -->
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../js/babel.min.js"></script>

    <script type="text/babel"> /* 此处一定要写babel */

        // 1.创建函数式组件
        function MyComponent(){
            
            console.log(this); // undefined
            //this 是 undefined， 因为 babel 翻译完 ，es5 开启了严格模式 strict mode ，不再让this 直接指向 window  ， 所以是undefined

            return <h2>我是用函数定义的 (简单) 组件 </h2>
        }

        // 闭合标签 ， 函数大写
        ReactDOM.render(<MyComponent/>, document.getElementById('test')); //react 没有选择器
        

    
    </script>

</body>
</html>
