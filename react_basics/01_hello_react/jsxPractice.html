<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
</head>
<body>
    <div id="test"></div>  
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../js/babel.min.js"></script>

    <script type="text/babel"> 
        const data = ['Angular', 'React', 'Vue']
        const VDOM = (
            <div>
                <h1>前端js框架列表</h1> 
                
                <ul>
                    {
                        //这里必须 js 表达式 ie.有返回值的 ，不是所有js语句
                        data.map( (item , index) =>{
                            return <li key= {index}>{item}</li> // 加{} 读的是 变量，js 语句 而不是 <li>item</li>这个名
                        })
                    }
                </ul>
            </div>
        )

        //2. 渲染虚拟dom 到页面;  render（渲染的虚拟dom ， 渲染到 哪个容器） src, dst
        ReactDOM.render(VDOM, document.getElementById('test')); //react 没有选择器
        
    
    </script>

</body>
</html>
