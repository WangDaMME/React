<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
    
        //1. 展开数组
        let arr1 = [1,3,5,7,9]
        console.log(...arr1) //1, 3, 5, 7, 9

        //2. 拼接数组
        let arr1 = [1,3,5,7,9]
        let arr2 = [2,4,6,8,10]
        let arr3 = [...arr1,...arr2]
        console.log(arr3) //1, 3, 5, 7, 9, 2, 4, 6, 8, 10


        //3. 当不确定 有多少元素
        function sum(...numbers)
        {
            // 聚合 操作 ， 2 个param1,param2 ..
            return numbers.reduce((prevValue, currentValue)=>{
                return prevValue+currentValue;
            })
        }
    
        console.log(sum(1,2,3,4)) // 1,2,3,4

        //4.复制对象

        //  es. 规范语法 - 字面量形式 复制一个对象
        let person = {name:'tom', age:19}
        // let person2 = ...person; //这样是不行的

        let person2 = {...person} // 只有 外面包裹花括号形式 才可以复制对象， es规范语法

        person.name = 'jerry'
        console.log(person2.name)

        //5. 复制对象时，修改它的属性 同时修改 or 合并 属性
        let person3 = {...person, name:'jack', address:'earth' }; // address 是添加
        console.log(person3)
    
    </script>
</head>

</body>
</html>
