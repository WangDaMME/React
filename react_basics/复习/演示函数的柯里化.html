<body>
    <script type="text/javascript">
    
    /*
    function sum (a,b,c )
    {
        return (a+b+c)
    }
    */

    // Currying 柯里化写法 ： - 通过函数调用 返回函数， 多次接收参数 统一处理
    function sum(a)
    {
        // 匿名函数 传入参数b
        return (b)=>{
            return (c) =>{
                return a+b+c; //【统一处理】
            }
        }
    }
        
    const res = sum(1)(2)(3);
    console.log(res)
    
    </script>
</body>
</html>
