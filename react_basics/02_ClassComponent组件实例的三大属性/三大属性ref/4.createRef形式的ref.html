<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
</head>
<body>
    <div id="test"></div>  
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../../js/babel.min.js"></script>

    <script type="text/babel"> 

        class Demo extends React.Component
        {
            //利用类追加属性的方式

            /** 1. React.createRef 调用后 返回一个容器， 该容器可以存储被 ref 所标识的节点， 
                   this.myRef 因为是 类追加属性的方式 ，挂载在类上
                2. 该容器是"专人专用的"， 如果同名的话， 会把之前加进的ref 替换掉
                   所以，要 创建 individually
            **/
            

            myRef = React.createRef();
            myRef2 = React.createRef();

            // current 是 人家 写好 默认的
            showData =()=>{
                console.log(this.myRef);
                alert(this.myRef.current.value)
            }

            showData2 =()=>{
                console.log(this.myRef2);
                alert(this.myRef2.current.value)
            }

            render(){
                return(
                    <div>
                        <input ref={this.myRef} type ="text" placeholder="点击按钮提示数据"/>&nbsp;
                        <button onClick = {this.showData}> 点我提示左侧数据</button>&nbsp;
                        {/* myref2 "专人专用" */}
                        <input onBlur = {this.showData2} ref={this.myRef2} type="text" placeholder="失去焦点提示数据"/>
                    </div>
                )
            }


        }

        

        ReactDOM.render(<Demo />, document.getElementById('test')); //react 没有选择器
  
    
    </script>

</body>
</html>
