<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test"></div>  <!-- 必须要有容器 dom 元素节点 -->
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../js/babel.min.js"></script>

    <script type="text/babel"> 
        /**
         * 1. 想办法 把一个state 放到组件实例对象三大属性里 的state -->放到构造器里'
         * 2. 通过一些办法 动态的 改变 state
         * **/
       class Weather extends React.Component 
       {
            // 构造器
            constructor(props) //三大属性2
            {
                super(props)
                console.log(this)
                this.state = {
                    isHot: true
                } // react 官方建议写成对象形式
            };

            // changeWeather 放在Weather 的原型上 , 供实例使用
            // 通过Weather 实例调用changeWeather时候， changeWeather 中的this就是Weather 的实例
            changeWeather(){

                // 由于changewether是作为onClick 的回调, 所以不是通过实例 调用的，而是直接调用的
                // 类中的方法 默认开启了局部的严格模式， 所以changeWeather 中的this 是undefined
                console.log(this);
            }

            // 必有render
            render(){
                
                // 可以 destructing 一下
                // const {isHot} = state.isHot;

                // 函数声明

                // this.changeWeather 报错原因 见复习 “类中this的方法”， 同理 this.changewweather 顺着原型链找到 这个方法， 交给onclick 作为回调
                // 点击的时候  是直接调用， 根本就不是 实例对象
                return <h1 onClick = {this.changeWeather}>今天天气很 - {this.state.isHot? '炎热' :'凉爽'}  </h1>
            }

       } 

       
        ReactDOM.render(<Weather/>, document.getElementById("test"))

        //对title 绑定点击事件
        function demo(){  // 不在类组件里

        console.log("标题被点击了");
        };


         //渲染组件到页面
    </script>

</body>
</html>
