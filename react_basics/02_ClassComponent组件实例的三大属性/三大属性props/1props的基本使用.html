<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello_react</title>
</head>
<body>
    <!-- 准备好有一个容器-->
    <div id="test"></div>  <!-- 必须要有容器 dom 元素节点 -->
     

    <!-- 引入react 核心库-->
    <script type= "text/javascript" src="../../js/react.development.js"></script>
    <!-- 引入react-dom.js 扩展库，用于支持react 操作dom-->
    <script type= "text/javascript" src="../../js/react-dom.development.js"></script>
    <!-- 引入babel, 用于将jsx 转换为js-->
    <script type= "text/javascript" src="../../js/babel.min.js"></script>

    <script type="text/babel"> 
       
       class Person extends React.Component 
       {
            render(){
                console.log(this)
                return (
                    // 整体
                    // 都在组件实例(this)的 props 里
                    <ul>
                        <li> name: {this.props.name} </li>
                        <li> age: {this.props.age} </li>
                        <li> hobby: {this.props.hobby} </li>
                    </ul>

                );
            }

       }
       
        ReactDOM.render(<Person name='abc' age = '18' hobby ='basketball'/>, document.getElementById("test"))



    </script>

</body>
</html>
